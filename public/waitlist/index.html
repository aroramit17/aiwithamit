<!doctype html>

  <head>

      rel="stylesheet"
    />
    <script async src="//tinder.thrivecart.com/embed/v2/thrivecart.js" id="tc-webpay-58-6B52AP"></script>
    <style>
      * {
        box-sizing: border-box;
        font-family: 'Almarai', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #e1e0cc;
        min-height: 100vh;
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px 80px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 32px;
      }
      header a.brand {
        color: rgba(225, 224, 204, 0.85);
        text-decoration: none;
        font-weight: 700;
        font-size: 18px;
        letter-spacing: -0.02em;
      }
      header a.brand:hover {
        color: #e1e0cc;
      }
      header a.back {
        color: rgba(225, 224, 204, 0.6);
        text-decoration: none;
        font-size: 13px;
      }
      header a.back:hover {
        color: #e1e0cc;
      }
      .hero {
        text-align: center;
        margin-bottom: 32px;
      }
      .eyebrow {
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(225, 224, 204, 0.6);
        margin: 0 0 12px;
      }
      .hero h1 {
        font-weight: 400;
        font-size: clamp(28px, 5vw, 48px);
        line-height: 1.05;
        margin: 0 0 12px;
        color: #e1e0cc;
      }
      .hero h1 em {
        font-family: 'Instrument Serif', serif;
        font-style: italic;
        font-weight: 400;
      }
      .hero p {
        font-size: 15px;
        color: rgba(225, 224, 204, 0.7);
        max-width: 560px;
        margin: 0 auto;
        line-height: 1.5;
      }
      .checkout-shell {
        background: #fff;
        border-radius: 20px;
        overflow: hidden;
        padding: 8px;
        min-height: 480px;
      }
      .loading {
        text-align: center;
        padding: 80px 24px;
        color: #6b6b6b;
        font-size: 15px;
        min-height: 200px;
      }
      .loading .dots::after {
        content: '';
        display: inline-block;
        width: 1.2em;
        text-align: left;
        animation: loading-dots 1.4s steps(4, end) infinite;
      }
      @keyframes loading-dots {
        0%, 20% { content: ''; }
        40% { content: '.'; }
        60% { content: '..'; }
        80%, 100% { content: '...'; }
      }
      .loading .verb {
        display: inline-block;
        font-family: 'Instrument Serif', serif;
        font-style: italic;
        font-weight: 400;
        font-size: 28px;
        color: #1a1a1a;
        margin-top: 14px;
        min-height: 1.2em;
        transition: opacity 0.25s ease;
      }
      .loading .verb.swap {
        opacity: 0;
      }
      @media (min-width: 640px) {
        .wrap {
          padding: 32px 24px 96px;
        }
        .checkout-shell {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <a class="brand" href="/">aiwithamit<sup style="font-size: 0.5em;">*</sup></a>
        <a class="back" href="/">&larr; Back to site</a>
      </header>

      <div class="hero">
        <p class="eyebrow">Zenler AI Summit · Founding price</p>
        <h1>Lock in your seat <em>before public launch.</em></h1>
        <p>
          You're getting the founding price as a Zenler AI Summit attendee. Checkout below — your
          access drops the moment the workshop goes live.
        </p>
      </div>

      <div class="checkout-shell">
        <div id="loading-placeholder" class="loading">
          <div>Claude is <span class="dots"></span></div>
          <div id="verb" class="verb">Conjuring</div>
        </div>
        <div
          class="tc-v2-embeddable-target"
          data-thrivecart-account="webpay"
          data-thrivecart-tpl="v2"
          data-thrivecart-product="58"
          data-thrivecart-embeddable="tc-webpay-58-6B52AP"
        ></div>
      </div>
    </div>

    <script>
      // Cycle through Claude verbs while the cart hydrates — same flavour
      // as the Claude Code spinner. The full list lives in verbs.csv.
      (function () {
        var VERBS = [
          'Actioning', 'Architecting', 'Baking', 'Befuddling', 'Billowing',
          'Blanching', 'Boogieing', 'Booping', 'Brewing', 'Bunning',
          'Burrowing', 'Canoodling', 'Cascading', 'Catapulting', 'Channeling',
          'Clauding', 'Coalescing', 'Cogitating', 'Computing', 'Creating',
          'Crunching', 'Crystallizing', 'Cultivating', 'Deciphering',
          'Determining', 'Discombobulating', 'Doodling', 'Ebbing',
          'Enchanting', 'Fiddle-faddling', 'Flambéing', 'Fluttering',
          'Forming', 'Frolicking', 'Gallivanting', 'Galloping', 'Garnishing',
          'Generating', 'Gitifying', 'Grooving', 'Harmonizing', 'Hatching',
          'Hullaballooing', 'Hyperspacing', 'Ideating', 'Incubating',
          'Infusing', 'Jitterbugging', 'Kneading', 'Leavening', 'Manifesting',
          'Marinating', 'Metamorphosing', 'Moonwalking', 'Mustering',
          'Nesting', 'Newspapering', 'Nucleating', 'Perambulating', 'Perusing',
          'Pondering', 'Pouncing', 'Prestidigitating', 'Propagating',
          'Puttering', 'Razzle-dazzling', 'Roosting', 'Seasoning',
          'Shenaniganing', 'Shimmying', 'Simmering', 'Skedaddling',
          'Sketching', 'Smooshing', 'Spelunking', 'Sprouting', 'Sublimating',
          'Swirling', 'Swooping', 'Thinking', 'Thundering', 'Tinkering',
          'Transmuting', 'Unfurling', 'Vibing', 'Waddling', 'Wandering',
          'Warping', 'Whirlpooling', 'Wibbling', 'Working'
        ];

        var verbEl = document.getElementById('verb');
        var verbInterval = null;
        if (verbEl) {
          // Shuffle so each visit feels fresh
          for (var i = VERBS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = VERBS[i]; VERBS[i] = VERBS[j]; VERBS[j] = tmp;
          }
          var idx = 0;
          verbEl.textContent = VERBS[idx];
          verbInterval = setInterval(function () {
            verbEl.classList.add('swap');
            setTimeout(function () {
              idx = (idx + 1) % VERBS.length;
              verbEl.textContent = VERBS[idx];
              verbEl.classList.remove('swap');
            }, 250);
          }, 900);
        }

        // ThriveCart injects its checkout iframe as a sibling rather than
        // inside the target div, so the placeholder doesn't auto-clear.
        // Remove it as soon as we see any ThriveCart iframe appear, or after 5s.
        var placeholder = document.getElementById('loading-placeholder');
        if (!placeholder) return;
        function hasCheckoutIframe() {
          return !!document.querySelector(
            'iframe[src*="thrivecart"], iframe[src*="webpay"], iframe[id*="thrivecart"], iframe[id*="webpay"]'
          );
        }
        function remove() {
          if (verbInterval) clearInterval(verbInterval);
          if (placeholder && placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
        }
        if (hasCheckoutIframe()) { remove(); return; }
        var observer = new MutationObserver(function () {
          if (hasCheckoutIframe()) { remove(); observer.disconnect(); }
        });
        observer.observe(document.body, { childList: true, subtree: true });
        setTimeout(function () {
          remove();
          observer.disconnect();
        }, 8000);
      })();
    </script>
  </body>
</html>
